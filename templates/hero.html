{% extends "base.html" %}
{% block title %}Hero Section — G & C Brews CMS{% endblock %}
{% block page_title %}Hero / Intro Text{% endblock %}

{% block content %}
<div class="card" style="max-width:700px">
  <div class="card-header">
    <div class="card-title">✦ Edit Hero Section</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Main Tagline <span class="hint">(big headline on the homepage)</span></label>
        <input type="text" name="tagline" value="{{ data.hero.tagline }}" required>
      </div>
      <div class="form-group">
        <label>Subtitle <span class="hint">(appears below tagline)</span></label>
        <input type="text" name="subtitle" value="{{ data.hero.subtitle }}">
      </div>
      <div class="form-group">
        <label>Description <span class="hint">(short paragraph about the café)</span></label>
        <textarea name="description" rows="4">{{ data.hero.description }}</textarea>
      </div>
      <div style="display:flex; gap:1rem; margin-top:0.5rem">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
