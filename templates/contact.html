{% extends "base.html" %}
{% block title %}Contact Info — G & C Brews CMS{% endblock %}
{% block page_title %}Contact Info{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header">
    <div class="card-title">📍 Edit Contact Details</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" value="{{ data.contact.address }}">
      </div>
      <div class="form-group">
        <label>Instagram Handle <span class="hint">(without @)</span></label>
        <input type="text" name="instagram" value="{{ data.contact.instagram }}" placeholder="gnc.brews2025">
      </div>
      <div class="form-group">
        <label>Phone Number <span class="hint">(optional)</span></label>
        <input type="tel" name="phone" value="{{ data.contact.phone }}" placeholder="e.g. (02) 1234 5678">
      </div>
      <div style="display:flex; gap:1rem; margin-top:0.5rem">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
